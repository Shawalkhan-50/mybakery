<!DOCTYPE html>
<html>
<head>
<title>Contact - Sweet Bakery</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff0f5;
    text-align:center;
                min-height: 100vh;
            display: flex;
            flex-direction: column;
        }



/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:#fd94a3;
}

.navbar h2{
    margin:0;
    color:white;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
    padding:8px 15px;
    border-radius:20px;
}

.navbar a:hover{
    background:#c2185b;
    color:white;
}



/* FORM */
input, textarea{
    width:70%;
    padding:10px;
    margin:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    background:#ca0b57;
    color:rgb(236, 217, 217);
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* FOOTER */
footer{
    background:lightcoral;
    padding:20px;
    color:white;
    margin-top:auto;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>🍰 Sweet Bakery</h2>
    <a href="blog.html">Blog</a>


<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="contact.html">Contact</a>
</div>

<!-- CONTACT -->
<h1>Contact Us 📩</h1>

<p>We would love to hear from you ✨</p>

<form>
<input type="text" placeholder="Your Name"><br>
<input type="email" placeholder="Your Email"><br>
<textarea placeholder="Your Message"></textarea><br>
<button onclick="alert('📩 Your message has been sent successfully! We will reply soon 🍰')">
Send Message
</button>
</form>

<!-- FOOTER -->
<footer>
<p>© 2026 Sweet Bakery | All Rights Reserved</p>
</footer>

</body>
</html>
